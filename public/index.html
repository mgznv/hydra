<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 640px;
      display: flex;
      flex-direction: column;
      height: 80vh;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h1 { font-size: 1rem; font-weight: 600; }

    .provider-badge {
      font-size: 0.75rem;
      color: #666;
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 99px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }

    .message.user {
      background: #0070f3;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #f0f0f0;
      color: #111;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .meta {
      font-size: 0.7rem;
      color: #999;
      margin-top: 6px;
    }

    .chat-input {
      padding: 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      height: 44px;
      line-height: 1.4;
    }

    textarea:focus { outline: none; border-color: #0070f3; }

    button {
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:disabled { background: #aaa; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #0060d3; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="chat-header">
      <h1>Hydra Chat</h1>
      <span class="provider-badge" id="provider-badge">conectando...</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input">
      <textarea id="input" placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    const PROXY_URL = "http://localhost:4567";
    const messages = [];

    async function fetchStatus() {
      try {
        const res = await fetch(`${PROXY_URL}/status`);
        const data = await res.json();
        document.getElementById("provider-badge").textContent =
          data.providers.join(" · ");
      } catch {
        document.getElementById("provider-badge").textContent = "sin conexión";
      }
    }

    function appendMessage(role, content, meta = null) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.id = role === "assistant" ? `msg-${Date.now()}` : undefined;

      const text = document.createElement("span");
      text.textContent = content;
      div.appendChild(text);

      if (meta) {
        const metaEl = document.createElement("div");
        metaEl.className = "meta";
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }

      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const btn = document.getElementById("send-btn");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      btn.disabled = true;

      messages.push({ role: "user", content: text });
      appendMessage("user", text);

      const assistantDiv = appendMessage("assistant", "");
      const textSpan = assistantDiv.querySelector("span");

      let fullContent = "";

      try {
        const res = await fetch(`${PROXY_URL}/chat/stream`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let provider = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          decoder.decode(value).split("\n").forEach(line => {
            if (!line.startsWith("data: ") || line === "data: [DONE]") return;
            try {
              const parsed = JSON.parse(line.slice(6));
              if (parsed.text) {
                fullContent += parsed.text;
                textSpan.textContent = fullContent;
                assistantDiv.scrollIntoView({ behavior: "smooth" });
              }
              if (parsed.provider) provider = parsed.provider;
            } catch {}
          });
        }

        messages.push({ role: "assistant", content: fullContent });

      } catch (e) {
        textSpan.textContent = "Error: " + e.message;
      }

      btn.disabled = false;
      input.focus();
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    fetchStatus();
  </script>
</body>
</html>
